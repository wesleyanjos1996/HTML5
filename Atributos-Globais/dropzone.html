<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dropzone</title>
    <style type="text/css">
        .box {
            width: 100px;
            height: 100px;
            background-color: chocolate;
        }

        .drop {
            width: 200px;
            height: 200px;
            border: 1px solid crimson;
        }
    </style>
</head>
<body>
    <div class="box" draggable="true"></div>
    <div class="drop" dropzone="copy"></div>
</body>
</html>
